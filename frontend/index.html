    <script>
      // Apply saved theme before React loads — prevents white flash on dark mode
      (function () {
        try {
          var theme = localStorage.getItem("ak-theme");
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (e) {}
      })();
    </script>
